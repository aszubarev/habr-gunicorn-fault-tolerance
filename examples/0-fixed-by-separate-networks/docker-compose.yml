version: "3.6"
services:

  nginx:
    image: nginx:1.29.6
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    networks:
      - network-bridge

  app:
    build:
      dockerfile: Dockerfile
      context: .
    ports:
      - "8000:8000"
    network_mode: host
    networks:
      - network-bridge

networks:
  network-bridge:
    driver: bridge
