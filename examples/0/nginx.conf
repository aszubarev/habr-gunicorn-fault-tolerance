events {
    worker_connections 1024;
}

http {
    access_log off;

    # Включение буферизации запросов
    proxy_request_buffering on;
    
    # Максимальное тело запроса
    client_max_body_size 64k;
    
    # Размер буфера для тела запроса
    client_body_buffer_size 64k;

    # настройка upstream (куда проксируется запрос)
    upstream app {
        server 127.0.0.1:8000;
    }

    server {
        listen 80;
        server_name example.com;

        location / {
            # Базовые proxy-заголовки
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Включение буферизации ответов
            proxy_buffering on;
            proxy_buffer_size 8K;
            proxy_buffers 16 8K;

            # Запрет записи временных файлов на диск
            proxy_max_temp_file_size 0;

            # проксируем в upstream "app"
            proxy_pass http://app;
        }
    }
}
