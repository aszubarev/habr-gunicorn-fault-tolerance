events {
    worker_connections 1024;
}

http {
    access_log off;

    # Включение буферизации запросов
    proxy_request_buffering on;
    
    # Максимальное тело запроса
    client_max_body_size 64k;
    
    # Размер буфера для тела запроса
    client_body_buffer_size 64k;

    # настройка upstream (куда проксируется запрос)
    upstream app {
        server 127.0.0.1:8000;

        keepalive           10;
        keepalive_timeout   25s;
        keepalive_requests  1000;
        keepalive_time      10m;
    }

    server {
        listen 80;

        location / {
            # Базовые proxy-заголовки
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Включение буферизации ответов
            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 8 64k;
            # Можно оставить значение по умолчанию
            proxy_busy_buffers_size 128k;

            # Запрет записи временных файлов на диск
            proxy_max_temp_file_size 0;

            # Keep Alive
            proxy_http_version        1.1;
            proxy_set_header          Connection "";

            # проксируем в upstream "app"
            proxy_pass http://app;
        }
    }
}
