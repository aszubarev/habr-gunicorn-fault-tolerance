pid                         /tmp/nginx/nginx.pid;
lock_file                   /tmp/nginx/nginx.lock;
error_log                   /dev/stderr warn;
worker_shutdown_timeout     30s;

events {
    worker_connections 1024;
}

http {
    access_log off;

    proxy_temp_path           /tmp/nginx/proxy;
    fastcgi_temp_path         /tmp/nginx/fastcgi;
    uwsgi_temp_path           /tmp/nginx/uwsgi;
    scgi_temp_path            /tmp/nginx/scgi;

    # Включение буферизации запросов
    proxy_request_buffering on;

    # Ignored if client_body_buffer_size equals client_max_body_size
    client_body_temp_path       /tmp/nginx/body;
    client_body_timeout         5s;
    client_body_buffer_size     1M;
    # Максимальное тело запроса
    client_max_body_size        1M;
    client_header_timeout       5s;

    upstream app {
        server 127.0.0.1:5000;

        keepalive           10;
        keepalive_timeout   5s;
        keepalive_requests  1000;
        keepalive_time      5m;
    }

    server {
        listen 8000;

        location / {
            # Базовые proxy-заголовки
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Включение буферизации ответов
            proxy_buffering on;
            proxy_buffer_size 8K;
            proxy_buffers 16 8K;

            # Запрет записи временных файлов на диск
            proxy_max_temp_file_size 0;

            # Keep alive
            proxy_http_version        1.1;
            proxy_set_header          Connection "";

            # Проксируем в upstream "app"
            proxy_pass http://app;
        }
    }
}
